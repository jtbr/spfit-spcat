  # publish-pypi:
  #   needs: build-wheels
  #   if: github.event_name == 'push'   # skip on workflow_dispatch test runs
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: pypi
  #     url: https://pypi.org/p/pickett
  #
  #   permissions:
  #     id-token: write   # required for OIDC trusted publisher
  #
  #   steps:
  #     - uses: actions/download-artifact@v7
  #       with:
  #         pattern: wheels-*
  #         merge-multiple: true
  #         path: dist/
  #
