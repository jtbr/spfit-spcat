# Release workflow — triggered by pushing a version tag (e.g. git tag v1.4.0 && git push --tags)
# or manually via the GitHub Actions UI (workflow_dispatch).
#
# Jobs:
#   build-cli       — native CLI binaries for Linux x86_64, macOS arm64/x86_64, Windows x86_64
#   build-wheels    — Python wheels via cibuildwheel (Linux x86_64+arm64, macOS arm64+x86_64, Win x86_64)
#   publish-release — uploads CLI tarballs/zips + wheels to a GitHub Release (tag push only)
#   update-pip-index — regenerates the PEP 503 simple index on gh-pages from all release wheels
#   publish-pypi    — (disabled) uploads wheels to PyPI via OIDC trusted publisher
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # enables manual runs from the GitHub Actions UI for testing

jobs:
  # ── CLI binaries ────────────────────────────────────────────────────────────
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            blas_setup: sudo apt-get install -y libopenblas-dev
            use_blas: ON
          - os: macos-latest      # Apple Silicon (arm64)
            target: macos-arm64
            osx_arch: arm64
            blas_setup: ''
            use_blas: ON          # finds Accelerate automatically
          - os: macos-latest      # cross-compiled x86_64 on Apple Silicon runner
            target: macos-x86_64
            osx_arch: x86_64
            blas_setup: ''
            use_blas: ON
          - os: windows-latest
            target: windows-x86_64
            blas_setup: ''
            use_blas: OFF         # use bundled dblas.c; avoids OpenBLAS packaging complexity

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # setuptools-scm needs full history to derive version from tags

      - name: Install BLAS (Linux)
        if: matrix.blas_setup != ''
        run: ${{ matrix.blas_setup }}

      - name: Configure
        shell: bash
        env:
          OSX_ARCH: ${{ matrix.osx_arch }}
        run: >
          cmake -B build
          -DUSE_SYSTEM_BLAS=${{ matrix.use_blas }}
          -DBUILD_ALL=ON
          ${OSX_ARCH:+-DCMAKE_OSX_ARCHITECTURES="$OSX_ARCH"}

      - name: Build
        run: cmake --build build --config Release

      - name: Bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          for exe in spfit spcat calmrg calbak stark termval sortn reassign sortegy iambak iamcalc moiam; do
            [ -f "build/$exe" ] && cp "build/$exe" dist/
          done
          tar czf "spfit-spcat-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C dist .

      - name: Bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          for exe in spfit spcat calmrg calbak stark termval sortn reassign sortegy iambak iamcalc moiam; do
            [ -f "build/Release/$exe.exe" ] && cp "build/Release/$exe.exe" dist/
          done
          cd dist && 7z a "../spfit-spcat-${{ github.ref_name }}-${{ matrix.target }}.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: spfit-spcat-${{ github.ref_name }}-*

  # ── Python wheels ──────────────────────────────────────────────────────────
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # setuptools-scm needs full history to derive version from tags

      # Needed to emulate aarch64 for Linux arm64 wheels
      - uses: docker/setup-qemu-action@v3
        if: runner.os == 'Linux'

      - uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: python/
          output-dir: wheelhouse/

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/

  # ── GitHub Release ─────────────────────────────────────────────────────────
  publish-release:
    needs: [build-cli, build-wheels]
    if: github.event_name == 'push'   # skip on workflow_dispatch test runs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: cli-*
          merge-multiple: true
          path: release-assets/

      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: release-assets/

      - uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true

  # ── pip simple index (GitHub Pages) ────────────────────────────────────────
  update-pip-index:
    needs: publish-release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate pip index
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/gen_pip_index.py

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin gh-pages; then
            git worktree add gh-pages-dir origin/gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages-dir
            touch gh-pages-dir/.nojekyll
          fi
          # Replace pip/ subdirectory only; root is free for a future docs site
          rm -rf gh-pages-dir/pip
          cp -r pip gh-pages-dir/
          cd gh-pages-dir
          git add -A
          git diff --cached --quiet && echo "Index unchanged." && exit 0
          git commit -m "Update pip index for ${{ github.ref_name }}"
          git push origin HEAD:gh-pages

  # ── PyPI ───────────────────────────────────────────────────────────────────
  # Disabled for now — wheels are attached to the GitHub Release instead.
  # To re-enable: uncomment this job and set up a PyPI trusted publisher
  # (pypi.org → project → Publishing → add trusted publisher:
  #   Owner: jtbr  Repository: spfit-spcat  Workflow: release.yml  Environment: pypi)
